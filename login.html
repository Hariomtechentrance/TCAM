<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCAM Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .container { max-width: 400px; margin: 80px auto; background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08);}
        h2 { color: #764ba2; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .submit-btn { width: 100%; background: linear-gradient(45deg, #764ba2, #ff6b35); color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);}
        .error { color: #f44336; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Login</h2>
        <div id="errorMsg" class="error" style="display:none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="bookingId">TCAM ID</label>
                <input type="text" id="bookingId" name="bookingId" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const bookingId = document.getElementById('bookingId').value;
            const password = document.getElementById('password').value;
            const res = await fetch('user-login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookingId, password })
            });
            const result = await res.json();
            if (result.status === 'success') {
                window.location.href = 'user-dashboard.html?bookingId=' + encodeURIComponent(bookingId);
            } else {
                document.getElementById('errorMsg').innerText = result.message || 'Invalid credentials';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
