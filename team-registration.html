<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Registration - TCAM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; }
        .container { max-width: 700px; margin: 40px auto; background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08);}
        h2 { color: #764ba2; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .form-group textarea { height: 100px; resize: vertical; }
        .submit-btn { width: 100%; background: linear-gradient(45deg, #764ba2, #ff6b35); color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);}
    </style>
</head>
<body>
    <div class="container">
        <h2>Team Registration</h2>
        <form id="teamRegistrationForm">
            <div class="form-group">
                <label for="team_name">Team Name</label>
                <input type="text" id="team_name" name="team_name" required>
            </div>
            <div class="form-group">
                <label for="captain_name">Captain Name</label>
                <input type="text" id="captain_name" name="captain_name" required>
            </div>
            <div class="form-group">
                <label for="district">District</label>
                <input type="text" id="district" name="district" required>
            </div>
            <div class="form-group">
                <label for="email">Captain Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Captain Phone</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="players_count">Number of Players</label>
                <select id="players_count" name="players_count" required>
                    <option value="">Select Players</option>
                    <option value="6">6 Players</option>
                    <option value="8">8 Players</option>
                    <option value="10">10 Players</option>
                    <option value="12">12 Players</option>
                </select>
            </div>
            <div class="form-group">
                <label for="venue">Preferred Venue</label>
                <select id="venue" name="venue" required>
                    <option value="">Select Venue</option>
                    <option value="mumbai">Mumbai Sports Complex</option>
                    <option value="delhi">Delhi Cricket Center</option>
                    <option value="bangalore">Bangalore Tennis Cricket Arena</option>
                    <option value="pune">Pune Sports Hub</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Special Requirements</label>
                <textarea id="message" name="message" placeholder="Any special requirements or additional information..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Register Team</button>
        </form>
    </div>
    <script>
        document.getElementById('teamRegistrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => data[key] = value);
            try {
                const response = await fetch('save-booking.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(`Thank you ${result.team_name || result.captain_name}! Your team registration is successful.\n\nYour TCAM ID: ${result.bookingId}`);
                } else {
                    alert('Team registration failed. Please try again.');
                }
            } catch (err) {
                alert('Could not connect to server. Please try again later.');
            }
            this.reset();
        });
    </script>
</body>
</html>
