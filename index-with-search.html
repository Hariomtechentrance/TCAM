<body>
    <div class="hero">
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="single-registration-enhanced.html">📝 Register</a>
            <a href="login-secure.php">🔐 Admin</a>
        </div>
        
        <div class="hero-content">
            <div class="logo">
                <img src="images/logo.png" alt="TCAM Logo">
            </div>
            
            <h1 class="title">TCAM Search Portal</h1>
            <p class="subtitle">
                Already registered before? Search your existing registration and download your data instantly!<br>
                <span style="color: #ffe0b2;">Find your TCAM ID, download receipts, and reuse data for new tournaments</span>
            </p>
            
            <div class="search-container">
                <h2 class="search-title">🔍 Search Your Registration</h2>
                
                <form id="quickSearchForm">
                    <div class="form-group">
                        <label for="search_type">Search By</label>
                        <select id="search_type" required>
                            <option value="">Select Search Type</option>
                            <option value="mobile">Mobile Number</option>
                            <option value="reg_id">TCAM ID</option>
                            <option value="document">Document ID (Aadhar / PAN / Driving Licence)</option>
                            <option value="name">Name</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="search_term">Enter Details</label>
                        <input type="text" id="search_term" placeholder="Enter your details..." required>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">🔍 Search Registration</button>
                        <a href="student-search.php" class="btn btn-secondary">Advanced Search</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('quickSearchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const searchType = document.getElementById('search_type').value;
            const searchTerm = document.getElementById('search_term').value;
            
            if (!searchType || !searchTerm) {
                alert('Please select search type and enter details');
                return;
            }
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Searching...';
            submitBtn.disabled = true;
            
            try {
                const url = new URL('student-search.php', window.location.href);
                url.searchParams.set('format', 'json');
                url.searchParams.set('search_type', searchType);
                url.searchParams.set('search_term', searchTerm);
                const response = await fetch(url.toString(), { credentials: 'same-origin' });
                const result = await response.json();
                
                if (result.status === 'success' && result.results && result.results.length > 0) {
                    displaySearchResults(result.results);
                } else {
                    alert(result.message || 'No registrations found. Please check your details and try again.');
                }
                
            } catch (error) {
                console.error('Search error:', error);
                alert('Search failed. Please try again.');
            } finally {
                // Reset button state
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        function displaySearchResults(results) {
            const resultsHtml = results.map(reg => `
                <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 10px; margin-bottom: 1rem; border-left: 4px solid #764ba2;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="color: #764ba2; margin: 0;">TCAM ID: ${reg.reg_id}</h3>
                        ${reg.photo ? `<img src="uploads/${reg.photo}" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;">` : ''}
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
                        <div><strong>Name:</strong> ${reg.name}</div>
                        <div><strong>Mobile:</strong> ${reg.mobile}</div>
                        <div><strong>City:</strong> ${reg.city}</div>
                        <div><strong>State:</strong> ${reg.state}</div>
                        ${reg.document_number ? `<div><strong>Document:</strong> ${reg.document_number}</div>` : ''}
                        <div><strong>Joined:</strong> ${reg.joined}</div>
                    </div>
                    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <a href="student-search.php?download=pdf&amp;id=${reg.id}&amp;token=${encodeURIComponent(reg.download_token || '')}" target="_blank" rel="noopener" style="background: #27ae60; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px;">📄 Download PDF</a>
                        <a href="student-search.php?download=json&amp;id=${reg.id}&amp;token=${encodeURIComponent(reg.download_token || '')}" target="_blank" rel="noopener" style="background: #3498db; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px;">📊 Download JSON</a>
                        <a href="single-registration-enhanced.html?reuse=${reg.id}&amp;token=${encodeURIComponent(reg.download_token || '')}" style="background: #ff6b35; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px;">🔄 Add another tournament</a>
                    </div>
                </div>
            `).join('');
            
            // Create results modal
            const resultsModal = document.createElement('div');
            resultsModal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                background: rgba(0,0,0,0.8); z-index: 10000; 
                display: flex; justify-content: center; align-items: center; padding: 2rem;
            `;
            
            resultsModal.innerHTML = `
                <div style="background: white; padding: 2rem; border-radius: 15px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="color: #764ba2; margin: 0;">🔍 Search Results (${results.length} found)</h2>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;">&times;</button>
                    </div>
                    ${resultsHtml}
                </div>
            `;
            
            document.body.appendChild(resultsModal);
        }
    </script>
</body>
