<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - TCAM</title>
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            color: #222;
        }
        .container {
            max-width: 1200px;
            margin: 60px auto 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            padding: 40px 24px 32px 24px;
        }
        h1 {
            color: #ff6b35;
            text-align: center;
            margin-bottom: 32px;
        }
        a.back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #ff6b35;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        a.back-link:hover {
            text-decoration: underline;
        }
        /* Gallery Section Styles */
        .gallery-section {
            background: #fff;
            padding: 0;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 22px;
            margin-top: 2.5rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
            cursor: pointer;
            opacity: 1;
            transition: none;
            z-index: 1;
            aspect-ratio: 1 / 1;
            /* Ensures square box */
            background: #eee;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 0;
            transition: none;
            filter: none;
            box-shadow: none;
        }
        .gallery-item::after,
        .gallery-item .gallery-hover-effect {
            display: none !important;
        }
        /* Remove all special looks and effects */
        .gallery-item.rounded,
        .gallery-item.shadow-lg,
        .gallery-item.border-pop,
        .gallery-item.effect-zoom,
        .gallery-item.effect-rotate,
        .gallery-item.effect-popup {
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transition: none !important;
        }
        /* Lightbox Styles */
        .gallery-lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .gallery-lightbox.active {
            display: flex;
            animation: fadeInLightbox 0.4s;
        }
        @keyframes fadeInLightbox {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            animation: popIn 0.5s cubic-bezier(.4,2,.6,1);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            transition: color 0.2s;
        }
        .close-lightbox:hover {
            color: #ff6b35;
        }
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
            }
            .gallery-item img {
                height: 120px;
            }
        }
        /* Custom gallery row layouts */
        .gallery-row {
            display: flex;
            gap: 22px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .gallery-row-5 .gallery-item { flex: 1 1 18%; }
        .gallery-row-4 .gallery-item { flex: 1 1 23%; }
        .gallery-row-3 .gallery-item { flex: 1 1 31%; }
        .gallery-row-2 .gallery-item { flex: 1 1 48%; }
        @media (max-width: 900px) {
            .gallery-row-5 .gallery-item,
            .gallery-row-4 .gallery-item,
            .gallery-row-3 .gallery-item { flex: 1 1 48%; }
        }
        @media (max-width: 600px) {
            .gallery-row,
            .gallery-row-5,
            .gallery-row-4,
            .gallery-row-3,
            .gallery-row-2 {
                flex-direction: column;
                gap: 18px;
            }
            .gallery-item img { height: 120px; }
        }
        /* Special looks for some photos */
        .gallery-item.rounded {
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255,107,53,0.18);
        }
        .gallery-item.shadow-lg {
            box-shadow: 0 12px 48px 0 rgba(118,75,162,0.18), 0 2px 8px 0 rgba(255,107,53,0.12);
        }
        .gallery-item.border-pop {
            border: 4px solid #ff6b35;
            box-shadow: 0 4px 24px rgba(255,107,53,0.12);
        }
        .gallery-item.effect-zoom:hover img {
            transform: scale(1.22) rotate(2deg);
            filter: brightness(1.18) saturate(1.25) drop-shadow(0 8px 24px #ff6b35aa);
        }
        .gallery-item.effect-rotate:hover img {
            transform: scale(1.08) rotate(8deg);
            filter: brightness(1.08) saturate(1.2) drop-shadow(0 6px 18px #764ba2aa);
        }
        .gallery-item.effect-popup {
            transition: transform 0.5s cubic-bezier(.4,2,.6,1), box-shadow 0.4s;
        }
        .gallery-item.effect-popup:hover {
            transform: scale(1.18) rotate(-2deg) translateY(-12px);
            box-shadow: 0 24px 64px 0 rgba(255,107,53,0.18), 0 2px 8px 0 rgba(118,75,162,0.12);
            z-index: 3;
        }
    </style>
    <script src="js/config.js"></script>
</head>

    <script>
        // Gallery fade-in animation
        document.addEventListener('DOMContentLoaded', () => {
            const galleryItems = document.querySelectorAll('.gallery-item');
            const galleryObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        galleryObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            galleryItems.forEach(item => galleryObserver.observe(item));

            // Gallery lightbox functionality
            const lightbox = document.getElementById('gallery-lightbox');
            const lightboxImg = document.querySelector('.lightbox-img');
            const closeLightbox = document.querySelector('.close-lightbox');
            document.querySelectorAll('.gallery-item img').forEach(img => {
                img.addEventListener('click', function() {
                    lightbox.classList.add('active');
                    lightboxImg.src = this.src;
                    lightboxImg.alt = this.alt;
                });
            });
            closeLightbox.addEventListener('click', () => {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            });
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                    lightboxImg.src = '';
                }
            });
        });
    </script>

    <script>
        // Gallery fade-in animation
        document.addEventListener('DOMContentLoaded', () => {
            const galleryItems = document.querySelectorAll('.gallery-item');
            const galleryObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        galleryObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            galleryItems.forEach(item => galleryObserver.observe(item));

            // Gallery lightbox functionality
            const lightbox = document.getElementById('gallery-lightbox');
            const lightboxImg = document.querySelector('.lightbox-img');
            const closeLightbox = document.querySelector('.close-lightbox');
            document.querySelectorAll('.gallery-item img').forEach(img => {
                img.addEventListener('click', function() {
                    lightbox.classList.add('active');
                    lightboxImg.src = this.src;
                    lightboxImg.alt = this.alt;
                });
            });
            closeLightbox.addEventListener('click', () => {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            });
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                    lightboxImg.src = '';
                }
            });
        });
    </script>
